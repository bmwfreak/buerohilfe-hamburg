<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img">
  <title>Vorher vs. Nachher: Manuelle Büroarbeit vs. Automatisierter Workflow</title>
  <defs>
    <marker id="arr-r" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C4563A"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#1E7A62"/>
    </marker>
  </defs>

  <rect width="1200" height="340" fill="#FFFFFF"/>

  <!-- Divider -->
  <line x1="600" y1="20" x2="600" y2="320" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- === VORHER === -->
  <text x="290" y="50" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#C4563A" letter-spacing="-0.5">VORHER</text>
  <text x="290" y="72" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="13" fill="#6B7280">Manuell. Langsam. Fehleranfällig.</text>

  <!-- ICON 1: Papierberg -->
  <g transform="translate(55,148)" stroke="#C4563A" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="8" y="26" width="64" height="50" rx="3"/>
    <rect x="4" y="14" width="64" height="50" rx="3"/>
    <path d="M0,4 L50,4 L66,20 L66,64 L0,64 Z"/>
    <path d="M50,4 L50,20 L66,20"/>
    <line x1="10" y1="28" x2="46" y2="28"/>
    <line x1="10" y1="40" x2="56" y2="40"/>
    <line x1="10" y1="52" x2="38" y2="52"/>
  </g>

  <!-- Arrow 1 -->
  <line x1="128" y1="185" x2="178" y2="185" stroke="#C4563A" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- ICON 2: Eingangskorb -->
  <g transform="translate(185,155)" stroke="#C4563A" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,45 L0,72 L80,72 L80,45 Z"/>
    <line x1="0" y1="45" x2="80" y2="45"/>
    <rect x="14" y="12" width="22" height="38" rx="2"/>
    <rect x="44" y="7" width="22" height="43" rx="2"/>
    <rect x="28" y="3" width="22" height="48" rx="2"/>
  </g>

  <!-- Arrow 2 -->
  <line x1="272" y1="185" x2="307" y2="185" stroke="#C4563A" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- ICON 3: Stempel -->
  <g transform="translate(313,148)">
    <rect x="20" y="0" width="30" height="14" rx="3" fill="#C4563A"/>
    <rect x="27" y="14" width="16" height="24" fill="#C4563A"/>
    <rect x="5" y="38" width="60" height="20" rx="2" fill="#C4563A"/>
    <text x="35" y="52" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700" fill="white">MANUELL</text>
    <rect x="10" y="63" width="50" height="13" rx="2" fill="none" stroke="#C4563A" stroke-width="1.5"/>
    <text x="35" y="73" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#C4563A">MANUELL</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="384" y1="185" x2="442" y2="185" stroke="#C4563A" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- ICON 4: Uhr -->
  <g transform="translate(447,148)" stroke="#C4563A" fill="none" stroke-width="2" stroke-linecap="round">
    <circle cx="38" cy="38" r="37"/>
    <line x1="38" y1="38" x2="38" y2="14"/>
    <line x1="38" y1="38" x2="55" y2="38"/>
    <line x1="38" y1="3" x2="38" y2="9"/>
    <line x1="38" y1="67" x2="38" y2="73"/>
    <line x1="3" y1="38" x2="9" y2="38"/>
    <line x1="67" y1="38" x2="73" y2="38"/>
  </g>

  <!-- Gestrichelter Rückpfeil (von Uhr zurück zu Papierberg) -->
  <path d="M484,252 C484,308 88,308 88,252" stroke="#C4563A" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arr-r)"/>

  <!-- === NACHHER === -->
  <text x="900" y="50" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#1E7A62" letter-spacing="-0.5">NACHHER</text>
  <text x="900" y="72" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="13" fill="#6B7280">Automatisiert. Klar. Effizient.</text>

  <!-- ICON 1: Dokument -->
  <g transform="translate(636,150)" stroke="#1E7A62" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,0 L48,0 L68,20 L68,84 L0,84 Z"/>
    <path d="M48,0 L48,20 L68,20"/>
    <line x1="10" y1="36" x2="58" y2="36"/>
    <line x1="10" y1="48" x2="58" y2="48"/>
    <line x1="10" y1="60" x2="40" y2="60"/>
  </g>
  <text x="670" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Dokument-</text>
  <text x="670" y="270" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">eingang</text>

  <!-- Arrow -->
  <line x1="712" y1="192" x2="764" y2="192" stroke="#1E7A62" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- ICON 2: Zahnrad -->
  <g transform="translate(770,152)">
    <path d="M37,0 L43,0 L44,11 C47,12 50,13 53,16 L63,9 L70,16 L63,26 C65,29 67,32 68,35 L79,36 L79,44 L68,45 C67,48 65,51 63,54 L70,64 L63,71 L53,64 C50,67 47,68 44,69 L43,80 L37,80 L36,69 C33,68 30,67 27,64 L17,71 L10,64 L17,54 C15,51 13,48 12,45 L1,44 L1,36 L12,35 C13,32 15,29 17,26 L10,16 L17,9 L27,16 C30,13 33,12 36,11 Z" stroke="#1E7A62" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="40" cy="40" r="14" stroke="#1E7A62" fill="none" stroke-width="2"/>
  </g>
  <text x="810" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Automatische</text>
  <text x="810" y="270" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Verarbeitung</text>

  <!-- Arrow -->
  <line x1="854" y1="192" x2="902" y2="192" stroke="#1E7A62" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- ICON 3: Check-Kreis -->
  <g transform="translate(908,152)" stroke="#1E7A62" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="40" cy="40" r="38"/>
    <polyline points="18,40 32,55 62,24"/>
  </g>
  <text x="948" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Prüfung &amp;</text>
  <text x="948" y="270" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Freigabe</text>

  <!-- Arrow -->
  <line x1="994" y1="192" x2="1054" y2="192" stroke="#1E7A62" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- ICON 4: Briefumschlag -->
  <g transform="translate(1060,162)" stroke="#1E7A62" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="88" height="62" rx="4"/>
    <polyline points="0,0 44,34 88,0"/>
    <line x1="0" y1="62" x2="34" y2="32"/>
    <line x1="88" y1="62" x2="54" y2="32"/>
  </g>
  <text x="1104" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Versand &amp;</text>
  <text x="1104" y="270" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#6B7280">Benachrichtigung</text>
</svg>
