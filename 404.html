<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0f172a" />
<title>Seite nicht gefunden — Systemic Automation</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="alternate icon" href="/favicon.ico" />
<style>
  @font-face {
    font-family: "Inter";
    font-style: normal;
    font-weight: 400 800;
    font-display: swap;
    src: url("/fonts/inter-latin-var.woff2") format("woff2");
  }
  :root {
    --accent: #2563eb;
    --accent-strong: #1d4ed8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(900px 400px at 80% -10%, rgba(37,99,235,0.18), transparent 60%),
      #0f172a;
    color: #cbd5e1; text-align: center; padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .code {
    font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
    color: #93c5fd; margin-bottom: 18px;
  }
  h1 { color: #fff; font-size: clamp(30px, 5vw, 44px); margin: 0 0 14px; letter-spacing: -0.03em; }
  p { font-size: 18px; max-width: 440px; margin: 0 auto 32px; }
  .actions { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 15px 28px; border-radius: 10px; text-decoration: none;
    font-weight: 600; font-size: 16px; border: 1px solid transparent;
    transition: transform 0.18s ease, background 0.18s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px -2px rgba(37,99,235,0.4); }
  .btn-primary:hover { background: var(--accent-strong); }
  .btn-ghost { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.18); }
  .btn-ghost:hover { background: rgba(255,255,255,0.14); }
</style>
</head>
<body>
  <main>
    <p class="code">404 — SEITE NICHT GEFUNDEN</p>
    <h1>Hier liegt nichts im Ordner.</h1>
    <p>Die Seite gibt es nicht (mehr). Zurück zur Startseite — oder ruft einfach kurz an.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Zur Startseite</a>
      <a class="btn btn-ghost" href="tel:+491736762711">📞 0173 6762711</a>
    </div>
  </main>
</body>
</html>
